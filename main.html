<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itchverse - Giriş</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
        background: radial-gradient(circle at 20% 20%, #3d3dff33, transparent),
                    radial-gradient(circle at 80% 80%, #ff3df533, transparent),
                    #0d0d12;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
    }

    .glow-line {
        position: absolute;
        width: 120%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #7f7fff, transparent);
        animation: slide 4s linear infinite;
        opacity: 0.4;
    }
    @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        background: rgba(255,255,255,0.06);
        padding: 40px 30px;
        border-radius: 18px;
        backdrop-filter: blur(18px);
        box-shadow: 0 0 25px rgba(0,0,0,0.35);
        text-align: center;
    }

    .logo-text {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 2px;
        margin-bottom: 25px;
        background: linear-gradient(135deg, #9fa9ff, #d8d9ff, #bb86ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .input-field {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        outline: none;
        margin-top: 12px;
        background: rgba(255,255,255,0.15);
        color: white;
        font-size: 15px;
        transition: 0.2s;
    }

    .input-field:focus {
        background: rgba(255,255,255,0.25);
        transform: scale(1.02);
    }

    .login-btn {
        width: 100%;
        margin-top: 22px;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #7f7fff, #9f9fff);
        color: white;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
    }

    .login-btn:hover {
        transform: scale(1.03);
        background: linear-gradient(135deg, #9f9fff, #c7c7ff);
    }

    .links {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.85;
    }

    .links a {
        color: #b8b8ff;
        text-decoration: none;
    }

    .links a:hover {
        text-decoration: underline;
    }

    @media (max-width: 450px) {
        .login-card {
            padding: 35px 22px;
        }
        .logo-text {
            font-size: 30px;
        }
    }
</style>
</head>

<body>

<div class="glow-line"></div>

<div class="login-card">
    <div class="logo-text">ITCHVERSE</div>

    <input id="username" class="input-field" type="text" placeholder="Kullanıcı Adı">
    <input id="password" class="input-field" type="password" placeholder="Şifre">

    <button class="login-btn" onclick="login()">Giriş Yap</button>

    <div class="links">
        <div><a href="#">Hesap oluştur</a></div>
        <div><a href="#">Şifreyi unuttum</a></div>
    </div>
</div>

<script>
function login() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        alert("Lütfen kullanıcı adı ve şifre giriniz.");
        return;
    }

    // Kullanıcıyı localStorage'a kaydet
    localStorage.setItem("itchverseUser", user);

    // Ana ekrana yönlendir
    window.location.href = "index1.html";
}
</script>

</body>
</html>
