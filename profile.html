<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil – Itchverse</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
    }

    body {
        background: #0c0c12;
        color: white;
        display: flex;
        min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
        width: 250px;
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(12px);
        border-right: 1px solid rgba(255,255,255,0.08);
        padding: 25px 20px;
        position: fixed;
        top: 0; bottom: 0;
    }

    .sidebar-logo {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 30px;
        background: linear-gradient(135deg, #9fa9ff, #d8d9ff, #bb86ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .sidebar a {
        display: block;
        padding: 12px 14px;
        border-radius: 10px;
        text-decoration: none;
        color: #dcdcff;
        margin-bottom: 8px;
        transition: 0.18s;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.12);
    }

    /* MAIN */
    .main {
        margin-left: 260px;
        flex: 1;
        padding: 20px;
    }

    /* TOPBAR */
    .topbar {
        width: 100%;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border-radius: 14px;
    }

    .topbar-title {
        font-size: 22px;
        font-weight: 700;
    }

    /* PROFILE BANNER */
    .profile-banner {
        margin-top: 20px;
        background: linear-gradient(135deg, #2a2a40, #1a1a28);
        padding: 35px 25px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 25px;
    }

    .avatar-box {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8888ff, #b69eff);
        border: 3px solid rgba(255,255,255,0.2);
    }

    .profile-info h2 {
        font-size: 26px;
        font-weight: 800;
    }

    .profile-info p {
        opacity: 0.75;
        margin-top: 4px;
    }

    /* EDIT SECTION */
    .edit-box {
        margin-top: 25px;
        padding: 20px;
        background: rgba(255,255,255,0.05);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .edit-box label {
        font-size: 15px;
        opacity: 0.9;
    }

    .input-field {
        width: 100%;
        margin-top: 8px;
        padding: 12px;
        background: rgba(255,255,255,0.12);
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 15px;
        color: white;
        margin-bottom: 15px;
    }

    .save-btn {
        padding: 12px 18px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #7f7fff, #a39aff);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    .save-btn:hover {
        transform: scale(1.04);
    }

    /* STATS */
    .stats {
        margin-top: 25px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
    }

    .stat-card {
        background: rgba(255,255,255,0.05);
        padding: 18px;
        border-radius: 14px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-number {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 5px;
    }

    @media(max-width: 850px) {
        .sidebar { display: none; }
        .main { margin-left: 0; }
    }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">ITCHVERSE</div>
    <a href="index1.html">Ana Sayfa</a>
    <a href="profile.html">Profil</a>
    <a href="#">Keşfet</a>
    <a href="#">Mağaza</a>
    <a href="#" onclick="logout()">Çıkış</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-title">Profil</div>
        <div class="avatar-box"></div>
    </div>

    <!-- PROFILE BANNER -->
    <div class="profile-banner">
        <div class="avatar-box"></div>

        <div class="profile-info">
            <h2 id="displayName"></h2>
            <p>Itchverse oyuncusu • Seviye 12 • 2025'ten beri üye</p>
        </div>
    </div>

    <!-- EDIT PROFILE -->
    <div class="edit-box">
        <label>Kullanıcı Adı</label>
        <input id="newName" class="input-field" type="text">

        <button class="save-btn" onclick="saveName()">Kaydet</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div>Oyun</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div>Takipçi</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div>Rozet</div>
        </div>
    </div>

</div>

<script>
    let user = localStorage.getItem("itchverseUser");
    if (!user) window.location.href = "login.html";

    document.getElementById("displayName").textContent = user;
    document.getElementById("newName").value = user;

    function saveName() {
        let newName = document.getElementById("newName").value.trim();

        if (newName.length < 3) {
            alert("Kullanıcı adı en az 3 karakter olmalı.");
            return;
        }

        localStorage.setItem("itchverseUser", newName);
        document.getElementById("displayName").textContent = newName;

        alert("Profil güncellendi!");
    }

    function logout() {
        localStorage.removeItem("itchverseUser");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
