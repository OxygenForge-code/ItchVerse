<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itchverse - Ana Ekran</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
    }

    body {
        display: flex;
        background: #111118;
        color: white;
        overflow-x: hidden;
    }

    /* SOL MENÜ */
    .sidebar {
        width: 220px;
        height: 100vh;
        background: #0d0d12;
        border-right: 1px solid rgba(255,255,255,0.1);
        padding-top: 25px;
        position: fixed;
        left: 0;
        top: 0;
    }

    .side-title {
        text-align: center;
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 30px;
        background: linear-gradient(135deg, #9fa9ff, #bb86ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1px;
    }

    .menu-item {
        padding: 14px 22px;
        font-size: 16px;
        opacity: 0.85;
        cursor: pointer;
        transition: 0.2s;
    }

    .menu-item:hover {
        background: rgba(255,255,255,0.08);
        opacity: 1;
    }

    /* ANA İÇERİK */
    .content {
        margin-left: 220px;
        width: calc(100% - 220px);
        padding: 20px;
    }

    /* NAVBAR */
    .navbar {
        width: 100%;
        padding: 15px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        backdrop-filter: blur(10px);
        margin-bottom: 20px;
    }

    .user-box {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.08);
        padding: 8px 15px;
        border-radius: 12px;
        cursor: pointer;
    }

    .avatar {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #8a8aff, #bb86ff);
        border-radius: 50%;
    }

    .game-grid {
        margin-top: 25px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 18px;
    }

    .game-card {
        background: rgba(255,255,255,0.08);
        padding: 12px;
        border-radius: 12px;
        transition: 0.2s;
    }

    .game-card:hover {
        transform: scale(1.05);
        background: rgba(255,255,255,0.15);
    }

    .game-img {
        width: 100%;
        height: 120px;
        background: #444;
        border-radius: 10px;
        margin-bottom: 8px;
    }

    @media (max-width: 700px) {
        .sidebar {
            display: none;
        }
        .content {
            margin-left: 0;
            width: 100%;
        }
    }
</style>
</head>
<body>

<!-- Sol Menü -->
<div class="sidebar">
    <div class="side-title">ITCHVERSE</div>
    <div class="menu-item">Ana Sayfa</div>
    <div class="menu-item" onclick="goProfile()">Profilim</div>
    <div class="menu-item">Oyunlar</div>
    <div class="menu-item">Topluluk</div>
    <div class="menu-item" onclick="logout()">Çıkış</div>
</div>

<!-- İçerik -->
<div class="content">

    <div class="navbar">
        <div class="user-box" onclick="goProfile()">
            <div class="avatar" id="avatarBox"></div>
            <span id="welcomeUser">Yükleniyor...</span>
        </div>
    </div>

    <h2 style="font-size:22px; margin-bottom:10px;">Önerilen Oyunlar</h2>

    <div class="game-grid">
        <div class="game-card">
            <div class="game-img"></div>
            Combat Rush
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            Block Builder
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            Galaxy Runner
        </div>
    </div>

</div>

<script>
    let user = localStorage.getItem("itchverseUser");
    let avatarColor = localStorage.getItem("itchverseAvatar");

    if (!user) window.location.href = "login.html";

    document.getElementById("welcomeUser").textContent = user;
    if (avatarColor) {
        document.getElementById("avatarBox").style.background = avatarColor;
    }

    function logout(){
        localStorage.clear();
        window.location.href = "login.html";
    }

    function goProfile(){
        window.location.href = "profile.html";
    }
</script>

</body>
</html>
